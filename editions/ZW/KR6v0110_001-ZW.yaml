body:
  text: 至心歸命禮本師釋伽牟尼佛昔在鹿薗說四諦後於鷲嶺說三乘地動眉毫照東方天花普散及龍神謗經定墜阿鼻獄出眾比糠塵童子聚沙為佛塔一禮直至菩提因願共諸眾生往生安樂國至心歸命禮本師釋伽牟尼佛火宅焚燒四面起長者愁惱三車迎門外喚子不肯出宅中是父心不驚五十餘年捨逃逝八難惡道被普願同修法華者永離娑婆生死身願共諸眾生往生安樂國至心歸命禮本師釋伽牟尼佛一雲含潤遍法界三草異色影泥空四大弟子皆授記十劫道場思惠風王子同時頭面禮梵天俱來獻寶宮險路疲人甚饑渴化濟渡群萌願共諸眾生往生安樂國尾缺錄文完附關於法華七禮文汪娟隨著法華經在中土的傳佈南北朝時期法華思想已經在高僧大德和庶民階層得到普遍的發展除了高僧的注疏講說以外華北地區更流行以邑義的信仰團體從事建造佛像寺院舉辦及參與齋會和若干儀式例如有豪族李次率領族人及村中居民共同信奉法華經並組成法華邑義團體延請僧侶講誦法華經塑造二佛並坐法華佛像並舉行開光供養齋戒行道等法華法會活動此外從六世紀的北魏後期至隋代法華十六王子的相關題銘或造像出現於河南河北山東山西等地區證明十六王子也成為齋懺儀式中稱名或禮敬的對象這些研究論述皆說明了佛教法會的禮懺儀式實為庶民表現信仰的重要活動方式之一江南地區有關法華信仰的活動則可以從廣弘明集所收錄的陳文帝妙法蓮華經懺文略窺一二其文云菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖今謹於某處建如干僧如干日法華懺見前大眾至心敬禮釋迦如來多寶世尊禮妙法華大乘經典並入道場證明功德擊大法鼓轉妙法輪震動世間覺悟凡品令使盡空法界無量聲聞無邊眾生皆為菩薩總持性相同到無生稽首敬禮常住三寶陳文帝在懺文中所說的今謹於某處建如干僧如干日法華懺並未明確指出具體的處所僧眾及日數顯示了此篇懺文可能是作為陳文帝於啟建法華懺時的懺文範本而非單次舉行法華懺的記錄而已此外由帝王勅令啟建甚至親自參與連續數日的法華懺也可能是屬於大型的齋懺法會再說在上位者的喜好與推動下民間有可能更為風行衹是僅從陳文帝簡短的懺文中仍不易得知當時整個法華懺的儀式如何進行如何具體地實踐至於現存最早以法華經為基礎而成立而且保存完整的佛教懺法為隋代天台創祖智顗所撰的法華三昧懺儀由於法華三昧懺儀屬於高僧大德所作不僅內容長篇巨製也包含了許多義理的解說其儀軌組織包括第一明三七日行法華懺法勸修第二明三七日行法前方便第三明正入道場三七日修行一心精進第四明初入道場正修行方法第五略明修證相其中第四正修行方法纔是禮懺的行法又細分為十科一者嚴淨道場二者淨身三者三業供養四者奉請三寶五者讚歎三寶六者禮佛七者懺悔八者行道旋遶九者誦法華經十者思惟一實境界可以說是一部禪定與懺悔並重事修與理觀相融圓融實相的觀法事實上以天台宗如此高深的修證禪觀的懺法和一般民眾所流行的法華信仰想必其間應當仍有一段不小的距離而且和單純是以禮佛儀式為主的法華七禮文在體製上修法上都有顯著的差異保存在敦煌遺書中的法華七禮文是一篇依據妙法蓮華經而立名的禮懺文形式極為單純關於法華七禮文的結構從現存的三禮來看可以歸屬於禮懺文中的禮佛儀節依次由稱名禮拜禮讚偈和聲三個部分組成法華七禮文的禮拜對象為本師釋迦牟尼佛稱名禮拜的儀節皆以至心歸命禮領句禮讚偈的形式是由七七七七七五七七的句式呈現和一般禮懺文多半係以純粹的五言或七言偈頌的歌讚體稍有不同在音樂曲調上的表現也可能更為活潑多樣至於和聲的部分願共諸眾生往生安樂國和其他禮懺文中常見的形式相同是由雙句五言組合而成同時也揭示出此篇禮懺文的目的在於發願往生阿彌陀佛的極樂世界由於禮佛的儀節屬於禮懺文的主體部分此前的請佛歎佛儀節以及之後的五悔處世界梵三歸依說偈發願六時偈頌無常偈等儀節在一般禮懺文的文本裡常有省略的情形未省略的部分也有搭配不同偈文的情形在儀式的進行中也有儀節次序的不同或是部分儀節的省略因此法華七禮文在僅存前三禮的情況下在禮佛之前或之後的儀節是否搭配有其他特定的偈文或是省略部分的儀節目前仍不得而知儘管如此以法華七禮文簡易的儀式與修法作為一般僧俗日常六時行道所使用禮懺文應當更為貼近一般庶民大眾的法華信仰至於法華七禮文的內容與思想則是先將妙法蓮華經的經文義理加以消融再透過具體的故事和譬喻轉化成一般通俗的禮懺文分別說明如下一從禮拜對象來看法華七禮文禮敬釋迦的緣由從法華七禮文目前殘存的三禮來看禮拜對象皆作本師釋迦牟尼佛其主要原因在於釋迦牟尼佛為法華經的說法者根據妙法蓮華經的序品首先敘述了佛陀說法華經的因緣一時佛住王舍城耆闍崛山中結跏趺坐放光現瑞天雨妙華大地震動文殊思忖如來今日當說大法而提婆達多品則敘述了佛陀於過去無量劫中求法華經無有懈惓化城喻品敘述了過去世有大通智勝如來其十六王子皆出家為沙彌並以受持諷誦樂說法華而受記成佛其中第十六子即釋迦牟尼佛見寶塔品敘述多寶如來寶塔特別從地踴出讚歎釋迦牟尼佛為大眾說妙法華經多寶佛並於寶塔中分半座與釋迦牟尼佛大眾皆見七寶塔中二佛並坐從地踴出品中復有娑婆世界無量千萬億菩薩摩訶薩同時踴出禮拜瞻仰讚歎於佛妙音菩薩品中復有妙音菩薩摩訶薩欲從淨華宿王智佛國與八萬四千菩薩圍繞而來至此娑婆世界供養親近禮拜於我亦欲供養聽法華經妙音菩薩品中復有普賢菩薩與大菩薩無量無邊不可稱數到娑婆世界耆闍崛山中頭面禮釋迦牟尼佛右繞七匝白佛言世尊我於寶威德上王佛國遙聞此娑婆世界說法華經與無量無邊百千萬億諸菩薩眾共來聽受由此可見經中多處敘及釋迦牟尼佛從過去無量劫以來即已不斷弘讚法華此次演說法華不但有天花地動毫光現瑞還有多寶如來寶塔從地踴出娑婆世界及他方世界無數諸大菩薩眾等皆來敬禮讚歎聽受此經特別是如來神力品中即時諸天於虛空中高聲唱言過此無量無邊百千萬億阿僧祇世界有國名娑婆是中有佛名釋迦牟尼今為諸菩薩摩訶薩說大乘經名妙法蓮華教菩薩法佛所護念汝等當深心隨喜亦當禮拜供養釋迦牟尼佛此段經文更為法華七禮文以釋迦牟尼佛作為禮拜對象提供了明確的理論基礎二從禮讚偈來看法華七禮文的思想及對法華經經文的轉化法華七禮文的禮讚偈大致是按照妙法蓮華經各品的先後次序並依據經文的旨趣重新融匯而成因此讚偈的詞句和經文看來不盡相同第一禮的讚偈作昔在鹿薗說四諦後於鷲嶺說三乘此二句總結了釋迦牟尼佛過去的說法並開啟了說法華經的契機鹿薗指鹿野園又譯作鹿苑鹿野苑等是佛陀成道後初轉法輪之地首句意指佛陀第一次的說法乃為度化五比丘而至此處說四諦法屬於聲聞法三乘是指聲聞乘緣覺乘菩薩乘為三乘分別說法即如法華經所云為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提成一切種智至於鷲嶺指靈鷲山或稱靈山鷲峰以山形似鷲頭及山中多鷲而得名音譯為耆闍崛山位於王舍城郊是佛陀經常說法的處所也是講法華等大乘經典之處為著名的佛教勝地其次地動眉毫照東方天花普散及龍神乃根據妙法蓮華經之序品而來敘述佛陀在耆闍崛靈鷲山中說法華經時爾時世尊四眾圍遶是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大眾普佛世界六種震動爾時佛放眉間白毫相光照東方萬八千世界靡不周遍佛陀如此放光現瑞種種妙相表示欲說大法欲令眾生咸得聞知一切世間難信之法故現斯瑞再次謗經定墜阿鼻獄出眾比糠塵以及童子聚沙為佛塔一禮直至菩提因乃根據妙法蓮華經之方便品而來敘述諸佛如來唯以佛之知見示悟眾生但以一佛乘故為眾生說法無有餘乘若二若三自過去無數劫以來是諸世尊等皆說一乘法化無量眾生令入於佛道因此若有眾生類值諸過去佛若聞法佈施或持戒忍辱精進禪智等種種修福慧如是諸人等皆已成佛道乃至童子戲聚沙為佛塔如是諸人等皆已成佛道或有人禮拜或復但合掌乃至舉一手或復小低頭自成無上道說明過去之人所植種種微小善行例如童子聚沙作塔乃至一個禮拜的動作皆為菩提之因如是之人皆已成佛道但因唯一佛乘的真實說為甚深微妙難解之法佛陀惟恐當來世惡人聞佛說一乘迷惑不信受破法墮惡道因此乃以方便力於一佛乘分別說三至於謗經定墜阿鼻獄出眾比糠塵又可見於譬喻品的偈頌若人不信毀謗此經則斷一切世間佛種其有誹謗如斯經典其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫從地獄出此處的糠塵可能是指微塵之意用來指稱長遠之時劫即微塵劫譬喻謗經之人墜入阿鼻地獄後能從地獄出者遙遙無期第二禮的讚偈作火宅焚燒四面起長者愁惱三車迎門外喚子不肯出宅中是父心不驚乃根據妙法蓮華經之譬喻品而來即火宅譬喻敘述大富長者之宅已破落傾危且四面火起諸子貪著嬉戲不肯逃出長者遂設方便以門外有三車羊車鹿車牛車珍玩誘導馳出然後等賜諸子白牛大車故事譬喻三界猶如火宅眾苦充滿甚可怖畏長者喻佛諸子喻眾生三車喻三乘聲聞乘辟支佛乘大乘如彼長者初以三車誘引諸子然後但與大車寶物莊嚴安隱第一譬喻如來初說三乘引導眾生然後但以大乘而度脫之其次五十餘年捨逃逝八難惡道被普願同修法華者永離娑婆生死身乃根據妙法蓮華經之信解品而來即窮子譬喻敘述窮子因年幼時捨父逃逝五十餘年不識其父乃大富長者後雖值遇懷怖恐懼避而他往歷盡艱辛險難幸得其父巧設方便欲臨終時方得父子相認盡付家中寶藏故事譬喻長者喻佛窮子喻眾生窮途險難喻生死煩惱寶藏喻佛法特別是法華經如富長者知子志劣以方便力柔伏其心然後乃付一切財物佛亦如是現稀有事知樂小者以方便力調伏其心乃教大智如彼窮子得無量寶聽受法華亦得永離生死長夜故云普願同修法華者永離娑婆生死身藥王菩薩本事品中亦云此經能救一切眾生者此經能令一切眾生離諸苦惱能令眾生離一切苦一切病痛能解一切生死之縛第三禮的讚偈作一雲含潤遍法界三草異色影泥空乃根據妙法蓮華經之藥草喻品而來即雲雨譬喻主要說明佛陀的說法平等博洽譬如三千大千世界山川谿谷土地所生卉木叢林及諸藥草種類若干名色各異密雲彌布遍覆三千大千世界一時等澍其澤普洽一雲所雨稱其種性而得生長華菓敷實雖一地所生一雨所潤而諸草木各有差別唯有如來知是一相一味之法所謂解脫相離相滅相究竟涅槃常寂滅相終歸於空三草異色是指各色各異的卉木叢林及諸藥草至於影泥二字其解不詳影或如金剛經所說的如夢幻泡影泥或如智顗仁王護國般若經疏所說的諸泥塵和合故假名為分亦和合諸分故名為塵此即名假也以此假故一切法空無論是虛無的泡影或是微細的泥塵皆為因緣和合所生之相常寂滅故終歸於空其次四大弟子皆授記乃根據妙法蓮華經之授記品而來敘述佛陀為摩訶迦葉須菩提大迦旃延大目犍連等四大弟子授記於未來世皆當成佛實際上宣示了聲聞乘的弟子亦可成佛再次十劫道場思惠風王子同時頭面禮梵天俱來獻寶宮險路疲人甚飢渴化濟渡群萌乃根據妙法蓮華經之化城喻品而來即化城譬喻前三句敘述了佛陀於過去生中受記成佛的故事過去有佛名大通智勝如來其佛本坐道場結跏趺坐身心不動時諸梵天王雨眾天華面百由旬香風時來吹去萎華更雨新者如是不絕過十小劫諸佛之法乃現在前即為十劫道場方得成道其佛未出家時有十六王子聞父成道皆共圍繞頭面禮足復有諸梵天王各以宮殿奉上彼佛皆請如來轉於法輪其後十六王子出家為沙彌聞說法華皆共受持諷誦樂說是經而受記成佛其中第十六子即釋迦牟尼佛後二句乃以化城譬喻彰顯世間無有二乘而得滅度唯一佛乘得滅度耳的思想譬如有一導師聰慧明達善知險道通塞之相將導眾人欲過此難但眾人卻因疲極飢渴而復怖畏意欲退還導師乃以方便力於險道中化作一城令眾人得於中途止息不必退卻復得向前導師喻佛眾人喻眾生惡道險難喻諸生死煩惱若眾生但聞一佛乘者則不欲見佛不欲親近便作是念佛道長遠久受懃苦乃可得成佛知是心怯弱下劣以方便力而於中道為止息故說二涅槃但是如來方便之力於一佛乘分別說三說明佛陀所以說有二乘可得滅度乃是為了度化怯弱眾生所施設的方便事實上衹有唯一佛乘而已綜合以上各禮讚偈的討論可以發現法華七禮文在前三禮中已融合匯聚了妙法蓮華經前七品的主要內容包含了法華七喻中的四喻火宅喻窮子喻雲雨喻化城喻在在顯示了法華經唯一佛乘的思想內涵一切眾生皆當作佛初說三乘衹是引導眾生的方便說法並且強調藉由法華經的修持必能度脫眾生永離生死八難值得注意的是在法華七禮文中很少引用經文也不以明文論述一乘思想更未見如經疏般的義理解析而是將最簡單具象的故事情節和譬喻重新轉化成幾近七言體的禮讚偈不但有助於一般庶民理解法華經的內容更容易落實在儀式之中的諷誦三從和聲來看法華七禮文的禮懺目的及其淨土信仰法華七禮文目前保存了第一禮第二禮的和聲皆作願共諸眾生往生安樂國此處的和聲已經呈現出法華七禮文的禮懺目的在於往生安樂國安樂國亦稱安養國安樂世界均為西方極樂世界之別名換言之從和聲的發願中可以顯示出法華七禮文是以往生西方淨土作為禮懺的目的根據妙法蓮華經藥王菩薩本事品所說若有人聞是藥王菩薩本事品者若有女人聞是經典如說修行於此命終即往安樂世界阿彌陀佛大菩薩眾圍繞住處生蓮華中寶座之上因此歷來流傳著許多天台宗祖師諸如天台創祖智顗弟子灌頂還有中興天台之祖湛然等人皆有發願往生西方淨土的說法例如灌頂在隋天台智者大師別傳中敘述智顗臨命終時專稱彌陀般若觀音唱二部經為最後聞思一為聽法華一為聽無量壽之後並說吾諸師友侍從觀音皆來迎我而在巴黎所藏敦煌本伯號的天台智者大師發願文其發願內容主要為上品往生阿彌陀佛國土甚至有假託智顗之名偽作有關淨土之書有觀經疏阿彌陀經疏淨土十疑論五方便念佛門等而道宣續高僧傳記載了灌頂臨終忽自起合掌如有所敬發口三稱阿彌陀佛色貌歡愉奄然而逝湛然也在自著的授菩薩戒儀廣願章中說願共法界諸眾生等捨此身已生極樂界彌陀佛前聽聞正法悟無生忍此外在唐代編撰的弘贊法華傳和法華傳記中也有相當多的僧俗因為誦持書寫法華經而往生西方極樂世界的記載例如前者載有沙門釋慧進釋跋澄白衣王淹史呵誓等皆得往生安養後者亦載有講法華的僧道昂諷誦轉讀的釋智通釋僧衍寡女揚氏尼妙空並州清信女等皆願生西方由此可見法華思想與西方淨土的信仰結合可以說是一般僧俗所流行的法華信仰的一種常見形態而法華七禮文即是以禮懺文的形式具體地反映出這樣的信仰形態總而言之法華七禮文作為依據妙法蓮華經而成立的禮懺文利用簡單易行的禮懺儀式和淺近易懂的故事譬喻將法華經文重新消融轉化強調脫離生死苦海往生西方淨土正好可以印證方廣錩先生所說的法華經固然有其深刻的思想但它更主要地反映為一種群眾性功德活動的信仰形態由此可見法華七禮文的發現對於理解中古時期民間的法華信仰所呈現的諸多樣貌的其中一面及其具體實踐的方式無疑具有一定的價值
