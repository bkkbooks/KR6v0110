body:
  text: 法華七禮文整理者汪娟題解法華七禮文中國佛教禮懺文獻一卷著者不詳保存在敦煌遺書中的法華七禮文是依據妙法蓮華經而立名的禮懺文主旨在於宣揚唯一佛乘的思想普願修持法華經者皆能永離娑婆世界往生阿彌陀佛的安樂國土獲得生死解脫本文抄寫於北敦號芥卷背據方廣錩先生判斷為歸義軍統治時期寫本大約在公元九世紀到十世紀本文首完尾缺存十六行首題作法華七禮文顧名思義其內容應有七禮可惜衹抄寫了不到三禮目前尚未發現其他寫本可資比對從形式結構來看殘存的三禮應屬於禮懺文的禮佛儀節敦煌本法華七禮文的發現對於理解中古時期法華信仰的具體實踐無疑具有一定的價值本文獻未為歷代經錄所著錄亦未為歷代大藏經所收文中有若干罕見之俗字辨識較難尚祈高明指正整理本底校本情況如下底本北敦號校本無錄文
